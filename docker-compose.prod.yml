services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filerepo}
      POSTGRES_USER: ${POSTGRES_USER:-filerepo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-filerepo} -d ${POSTGRES_DB:-filerepo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:?MEILISEARCH_API_KEY is required}
      MEILI_ENV: production
    volumes:
      - meili-data:/meili_data

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    volumes:
      - clamav-data:/var/lib/clamav

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ${APP_ENV_FILE:-.env.production}
        required: true
    depends_on:
      - postgres
      - redis
      - meilisearch
      - clamav
    volumes:
      - ./storage:/app/storage
      - ./backups:/app/backups
    ports:
      - "127.0.0.1:4000:4000"

  scan-worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "worker:scan-queue", "-w", "@filerepo/backend"]
    env_file:
      - path: ${APP_ENV_FILE:-.env.production}
        required: true
    depends_on:
      - backend
      - redis
      - clamav
    volumes:
      - ./storage:/app/storage

  email-worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "worker:email-queue", "-w", "@filerepo/backend"]
    env_file:
      - path: ${APP_ENV_FILE:-.env.production}
        required: true
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres-data:
  redis-data:
  meili-data:
  clamav-data:
